<div class="product-details-page py-4">
  <div class="container">
    <!-- Back Header -->
    <div class="d-flex align-items-center mb-2">
      <button class="btn-back" (click)="goBack()">
        <i class="fas fa-chevron-right me-2"></i> العودة للمنتجات
      </button>
    </div>

    <div class="details-card">
      <div class="row g-0">
        <!-- Media Section -->
        <div class="col-lg-6">
          <div class="media-container">
            <div id="productCarousel" class="carousel slide" data-bs-ride="carousel">
              <div class="carousel-inner">
                <div *ngFor="let img of product.images; let i = index" class="carousel-item" [class.active]="i === 0">
                  <div class="aspect-ratio-box">
                    <img [src]="'https://mahabamarket.bsite.net/Images/' + img" class="product-img" alt="product image">
                  </div>
                </div>
              </div>

              <!-- Glassmorphism Controls -->
              <button class="carousel-control-prev custom-ctrl" type="button" data-bs-target="#productCarousel"
                data-bs-slide="prev">
                <span class="carousel-nav-icon"><i class="fas fa-chevron-right"></i></span>
              </button>
              <button class="carousel-control-next custom-ctrl" type="button" data-bs-target="#productCarousel"
                data-bs-slide="next">
                <span class="carousel-nav-icon"><i class="fas fa-chevron-left"></i></span>
              </button>
            </div>
          </div>
        </div>

        <!-- Info Section -->
        <div class="col-lg-6">
          <div class="info-content">
            <div class="top-meta mb-2">
              <span class="category-badge">{{ product.cat_Name }}</span>
            </div>

            <h1 class="product-title mb-3">{{ product.name }}</h1>

            <div class="price-section mb-4">
              <span class="price-label">السعر الحالي</span>
              <div class="price-group d-flex align-items-baseline gap-3">
                <span class="price-value">{{ product.price }} ج.م</span>
                <span *ngIf="product.priceBeforeDiscount" class="old-price-value">
                  {{ product.priceBeforeDiscount }} ج.م
                </span>
              </div>
            </div>

            <hr class="separator">

            <div class="description-section mb-4" *ngIf="product.description">
              <h5 class="section-title">الوصف</h5>
              <p class="product-description" [class.expanded]="expandedProductId === product.product_Id"
                (click)="toggleDescription(product.product_Id)">
                {{ product.description }}
              </p>
            </div>

            <div class="details-section mb-4" *ngIf="product.content">
              <h5 class="section-title">التفاصيل</h5>
              <div class="product-content">{{ product.content }}</div>
            </div>

            <div class="action-footer mt-auto pt-4">
              <button class="btn-primary-action w-100" (click)="addtocart(product)">
                <i class="fas fa-shopping-basket me-2"></i> أضف إلى السلة
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Video Section -->
    <div *ngIf="product.youtubeLink" class="video-section mt-5">
      <div class="section-header mb-3">
        <i class="fab fa-youtube text-danger me-2"></i>
        <h4 class="mb-0">الفيديو التعريفي</h4>
      </div>
      <div class="video-card overflow-hidden rounded-4 shadow-sm border">
        <div class="ratio ratio-16x9">
          <iframe [src]="getSafeYoutubeLink(product.youtubeLink)" title="YouTube video" allowfullscreen></iframe>
        </div>
      </div>
    </div>
  </div>
</div>
