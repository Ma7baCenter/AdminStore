<div class="container">
  <!-- Category Filter -->
  <!-- <div class="row d-flex justify-content-center align-items-center mb-4 mt-3" >
    <div class="col-12 col-md-4">
      <select class="form-select" style="color: rgba(218, 72, 4, 0.932);" [(ngModel)]="chooseCatID" (change)="getSelCat()">
        <option *ngFor="let cat of catList" [value]="cat.cat_Id" style="color: rgba(218, 72, 4, 0.932);">{{ cat.namecat }}</option>
      </select>
    </div>
  </div> -->

  <div class="category-scroll-container">
    <div *ngFor="let cat of catList" (click)="chooseCatID = cat.cat_Id; getSelCat()"
      [class.selected]="chooseCatID === cat.cat_Id" class="cat-circle text-center">
      <!-- <img [src]="cat.imageUrl" alt="{{ cat.namecat }}" /> -->
      <img [src]="'https://mahabamarket.bsite.net/Category/' + cat.img" alt="{{ cat.namecat }}" />
      <div class="cat-name">{{ cat.namecat }}</div>
    </div>
  </div>

  <div class="search-section">
    <div class="search-box">
      <i class="fas fa-search search-icon"></i>
      <input type="text" class="form-control search-input" [(ngModel)]="filterObj.item"
        (keyup)="filterProducts(filterObj.item)" placeholder="بحث بالاسم...">
    </div>
  </div>



  <!-- Cards Grid -->
  <div class="row g-2 g-md-3 justify-content-center">
    @for (Item of productslist; track Item.product_Id)
    {
    <div class="col-6 col-md-4 col-lg-3 d-flex justify-content-center">
      <div class="card" style="width: 100%; max-width: 20rem;">

        <a [routerLink]="'/details/' + Item.product_Id" class="card-image-wrapper">
          <div class="image-container">
            <!-- Product Image -->
            <img
              [src]="Item.images[0] ? 'https://mahabamarket.bsite.net/Images/' + Item.images[0] : 'assets/ma7aba.jpg'"
              class="card-img-top" [alt]="Item.name" />

            <!-- Top Overlay: Discount -->
            <div class="card-overlay-top" *ngIf="Item.percent != null">
              <span class="discount-badge">{{ Item.percent }}% OFF</span>
            </div>

            <!-- Bottom Overlay: Name & Price -->
            <div class="card-overlay-bottom">
              <h5 class="card-title-overlay">{{ Item.name }}</h5>
              <div class="price-container">
                <span class="price-tag-overlay">{{ Item.price }} ج.م</span>
                <span *ngIf="Item.priceBeforeDiscount != null" class="old-price-overlay">
                  {{ Item.priceBeforeDiscount }}
                </span>
              </div>
            </div>
          </div>
        </a>

        <!-- Mini Footer: Add to Cart only -->
        <div class="card-footer-mini">
          <button type="button" class="btn-add-mini" (click)="addtocart(Item)">
            أضف للسلة
          </button>
        </div>
      </div>
    </div>
    }
  </div>

  <!-- Pagination -->
  <div class="row justify-content-center my-4">
    <div class="col-auto">
      @if(productslist.length >= 8)
      {
      <a class="btn" style="background-color:  rgba(245, 112, 3, 0.966);color: white" (click)="onNext()">Next</a>
      }
    </div>
    <div class="col-auto">
      <a class="btn" style="background-color:  rgba(245, 112, 3, 0.966); color: white;">{{ filterObj.pg }}</a>
    </div>
    <div class="col-auto">
      @if(filterObj.pg > 1)
      {
      <a class="btn" style="background-color:  rgba(245, 112, 3, 0.966); color: white;" (click)="onPrevious()">Prev</a>
      }
    </div>
  </div>
</div>
